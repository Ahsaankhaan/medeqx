<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 315 84" width="315" height="84">
  <!-- Icon block -->
  <rect x="0" y="8" width="68" height="68" rx="14" fill="#0057FF"/>
  <circle cx="34" cy="42" r="22" stroke="white" stroke-width="3.5" fill="none"/>
  <line x1="22" y1="30" x2="46" y2="54" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="46" y1="30" x2="22" y2="54" stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- MEDICAL EQUIPMENT descriptor — font-size 14 so it is readable at display size -->
  <text x="84" y="31"
    font-family="Arial,Helvetica,sans-serif"
    font-size="14"
    font-weight="700"
    fill="#0057FF"
    letter-spacing="1.5">MEDICAL EQUIPMENT</text>

  <!-- Wordmark: medeq (dark) + clear gap + X (blue) in one text element -->
  <text x="82" y="67"
    font-family="Arial,Helvetica,sans-serif"
    font-size="36"
    font-weight="800">
    <tspan fill="#00040F" letter-spacing="-1">medeq</tspan><tspan fill="#0057FF" dx="14">X</tspan>
  </text>
</svg>
